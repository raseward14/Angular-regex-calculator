<div class="parent-grid">
  <div class="child-item">
    <span style="color: blue">let</span> text = "
    <input
      name="userString"
      [style.width.ch]="userInput().length > 0 ? userInput().length : 2"
      style="min-width: 4ch; font-family: monospace; border: none; color: green"
      [(ngModel)]="userInput"
      placeholder="..."
    />
    ";

    <p><span style="color: blue">let</span> code = text.{{ resolvedOperation() }}</p>
    @if (hasParameters()) {
      Position: <input type="number" [(ngModel)]="position" />
    }
    <p>Result: {{ calculatedResult() }}</p>
  </div>

  <div class="child-item">
    <div class="two-column-grid">
      @for (method of stringMethods; track $index) {
        <label class="grid-item">
          <input name="stringMethods" type="radio" (change)="onMethodChange(method)" />
          <span style="font-weight: bold"> {{ method.method }}</span>
        </label>
        <div class="grid-item">
          {{ method.description }}
        </div>
      }
    </div>
  </div>
</div>
