<form [formGroup]="regexForm">
    <section>
        <h4>Expression</h4>
        <span class="form-control">
            /<input 
                type="text" 
                formControlName="regexControl" 
                [attr.size]="regexControlValue.length || 0" 
                placeholder="Enter regex here" />/
        </span>
    </section>
    <hr />
    <section>
        <h4>Test String</h4>
        <textarea class="test-string">{{ testString }}</textarea>
    </section>
    <section>
        <h4>Matches</h4>
        <textarea class="test-string">{{ regexPattern }}</textarea>
    </section>
</form>
