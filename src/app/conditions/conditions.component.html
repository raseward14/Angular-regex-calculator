<ul>
    @for (condition of regexConditions; track condition.id) {
        <ul>
            <input type="checkbox" id="{{ condition.id }}" name="{{ condition.id }}" value="{{ condition.id }}">
            <label for="{{ condition.id }}">{{ condition.description }}</label>
        </ul>
    }
</ul>

<input type="text" placeholder="Enter your regex here..." />
