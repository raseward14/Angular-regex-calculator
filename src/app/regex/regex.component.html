<form [formGroup]="regexForm">
    <section>
        <h4>Expression</h4>
            <input 
                class="form-control" 
                type="text" 
                formControlName="regexControl" 
                placeholder="Enter your regex here" />
            
    </section>
    <hr />
    <section>
        <h4>Test String</h4>
        <textarea class="test-string">{{ testString }}</textarea>
    </section>
</form>
